job:
  name: test_run
  env_type: venv
  loop: true
  remote_user: linrong

tpu:
  allocation_mode: "queued-resources"  # tpu-vm | queued-resources
  accelerator: v5p-16
  name: taiming-${tpu.accelerator}
  zone: us-central1-a
  version: v2-alpha-tpuv5
  pricing: spot  # spot | ondemand | preemptible
  startup_script: null
  tags: ["jobman", "experiment"]
  metadata:
    owner: "linrong"  # owner can be used to map tpus to user
    purpose: "testing jobman"

gcsfuse:
  bucket_name: linrong_central1
  mount_path: /home/linrong/gcs-bucket

ssh:
  private_key: ~/.ssh/google_rsa
  identities:
    - private_key: ~/.ssh/google_rsa
      public_key: ~/.ssh/google_rsa.pub
      config_entry: |
        Host 10.* 34.* 35.*
          IdentityFile ~/.ssh/google_rsa
          IdentitiesOnly yes

venv:
  name: maxtext_env
  requirements_file: assets/maxtext-requirements.txt
  python: "python3.10"

command:
  cmd: |
    echo "========================"
    echo "hello"
    echo "========================"
  workers: [0]  # int | list | "all"